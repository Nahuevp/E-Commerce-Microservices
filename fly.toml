# Fly.io App Configuration
# E-Commerce Microservices

app = "ecommerce-microservices"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile.all-in-one"

[env]
  PORT = "80"
  ASPNETCORE_ENVIRONMENT = "Production"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Scale to 0 when not in use (free tier)
[auto_scale]
  min_machines_running = 0
  max_machines = 1
