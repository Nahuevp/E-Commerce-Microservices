# Render Blueprint - E-Commerce Microservices
# Single Web Service con Docker

services:
  - type: web
    name: ecommerce-microservices
    runtime: docker
    dockerfilePath: ./Dockerfile.all-in-one
    region: oregon
    plan: free
    healthCheckPath: /
    
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: JWT_KEY
        generateValue: true
