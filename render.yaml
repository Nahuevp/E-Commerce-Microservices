# Render Blueprint - E-Commerce Microservices
# Single Web Service con Docker

databases:
  - name: ecommerce-db
    databaseName: ecommerce
    plan: free
    region: oregon

services:
  - type: web
    name: ecommerce-microservices
    runtime: docker
    dockerfilePath: ./Dockerfile.all-in-one
    region: oregon
    plan: free
    healthCheckPath: /health
    
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: JWT_KEY
        generateValue: true
      - key: DATABASE_URL
        # IMPORTANTE: Render pasa la connection string automáticamente desde la DB
        # No necesitas valor aquí - se infiere del servicio de base de datos
        fromDatabase:
          name: ecommerce-db
          property: connectionString
